<script>
    // 1. ؤگل»‹nh dل؛،ng ngأ y giل»?    Date.prototype.format = function (fmt) {
        var o = {
            "y+": this.getFullYear(),
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
        };
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    // 2. Cل؛­p nhل؛­t ngأ y giل»?hل»?thل»‘ng liأھn tل»¥c (Phأ­a trأھn QR)

    // 3. LOGIC NHل؛¤N 5 Lل؛¦N Vأ€O "ؤگأƒ Cأ“ HIل»†U Lل»°C" ؤگل»?HIل»†N Dل؛¤U TأچCH XANH
    let successClicks = [];

    let startTime = localStorage.getItem("startTime") || Date.now();

    // Hiل»ƒn thل»?ؤ‘ل»“ng hل»?ؤ‘ل؛؟m thل»‌i gian ؤ‘أ£ trأ´i qua
    setInterval(function () {
