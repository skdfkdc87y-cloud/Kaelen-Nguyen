<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    background: url('IMG_8622.jpeg') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: flex-start;
    min-height: 100vh;
}

/* overlay nền tối */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

/* container */
.container {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    padding-top: 60px;
    text-align: center;
}

/* tên user */
.user-info {
    font-size: 1.1rem;
    margin-bottom: 22px;
    font-weight: 600;
    color: #e0c9a6;
    text-shadow: 0 2px 4px rgba(0,0,0,1);
}

/* card QR */
.qr-card {
    background: white;
    border-radius: 16px;
    width: 78%;
    margin: 0 auto;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.45);
}

/* header */
.qr-header {
    background-color: #f5c542;
    color: white;
    padding: 18px 12px;
    font-size: 0.82rem;
}

/* body */
.qr-body {
    padding: 18px 10px 22px;
}

#current-time {
    font-size: 0.9rem;
    margin-bottom: 10px;
}

/* QR */
.qr-image-container {
    width: 85%;
    margin: 0 auto;
}

.ewm {
    width: 100%;
}

/* text */
.refresh-text {
    font-size: 0.75rem;
    margin: 12px 0 8px;
    color: #999;
}

.status-active {
    color: #2ecc71;
    font-size: 1.25rem;
    font-weight: bold;
}

#timer-up {
    color: #2ecc71;
    font-size: 0.95rem;
}

/* hiệu ứng */
@keyframes breath {
    0%,100% {opacity:0.7;}
    50% {opacity:1;}
}
.status-active {
    animation: breath 2.5s infinite;
}

/* notch */
.notch {
    position: absolute;
    width: 12px;
    height: 12px;
    background-color: #2e3045;
    border-radius: 50%;
    top: 50px;
}
.notch-left { left: -6px; }
.notch-right { right: -6px; }

/* footer */
.footer-note {
    margin: 35px;
    font-size: 0.82rem;
    line-height: 1.6;
    color: #e0c9a6;
    text-align: left;
    text-shadow: 1px 1px 4px rgba(0,0,0,1);
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
    <div class="user-info">V25090035(Kaelen Nguyen)</div>

    <div class="qr-card">
        <div class="qr-header">
            将二维码对准扫描器刷码出场
        </div>

        <div class="notch notch-left"></div>
        <div class="notch notch-right"></div>

        <div class="qr-body">
            <div id="current-time"></div>

            <div class="qr-image-container">
                <img src="./ewm.gif" class="ewm"
                onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=KaelenNguyen'">
            </div>

            <div class="refresh-text">刷新二维码</div>
            <div class="status-active">已生效</div>
            <div id="timer-up">00:00</div>
        </div>
    </div>

    <div class="footer-note">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
// giờ realtime
function updateClock() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,'0');
    const d = String(now.getDate()).padStart(2,'0');
    const h = String(now.getHours()).padStart(2,'0');
    const mi = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById("current-time").innerText =
        `${y}-${m}-${d} ${h}:${mi}:${s}`;
}

// timer tăng
let start = localStorage.getItem("t");
if(!start){
    start = Date.now();
    localStorage.setItem("t", start);
}else{
    start = parseInt(start);
}

function updateTimer(){
    let now = Date.now();
    let diff = Math.floor((now - start)/1000);

    if(diff >= 43200){
        start = Date.now();
        localStorage.setItem("t", start);
        diff = 0;
    }

    let h = Math.floor(diff/3600);
    let m = Math.floor((diff%3600)/60);
    let s = diff%60;

    let txt = h>0
        ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    document.getElementById("timer-up").innerText = txt;
}

setInterval(updateClock,1000);
setInterval(updateTimer,1000);
updateClock();
updateTimer();
</script>

</body>
</html>
