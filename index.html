<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Giao diện QR Security</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #393a4e; /* Màu nền tối gốc */
            background-image: url("IMG_8622.jpeg"); /* Hình nền của bạn */
            background-size: cover;
            background-position: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            margin-top: 40px;
            text-align: center;
        }

        /* Tên ID phía trên */
        .user-id {
            color: #f4e4c0;
            font-size: 18px;
            margin-bottom: 25px;
            font-weight: 400;
        }

        /* Khung chứa chính */
        .main-card {
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            position: relative;
        }

        /* Phần Banner Vàng phía trên */
        .banner-top {
            background-color: #ebb94d;
            color: rgba(255, 255, 255, 0.9);
            padding: 35px 20px;
            border-radius: 8px 8px 0 0;
            font-size: 16px;
            font-weight: 500;
            position: relative;
        }

        /* Phần nội dung Trắng phía dưới */
        .content-bottom {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 0 0 8px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Hai lỗ đục ở giữa (khớp nối) */
        .circle-cutout {
            position: absolute;
            width: 16px;
            height: 16px;
            background-color: #393a4e; /* Phải trùng màu nền body */
            border-radius: 50%;
            top: 86px; /* Căn giữa đường nối */
            z-index: 10;
        }
        .cut-left { left: -8px; }
        .cut-right { right: -8px; }

        .time-stamp {
            color: #333;
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .qr-code {
            width: 240px;
            height: 240px;
            margin: 10px 0;
        }

        .refresh-btn {
            color: #666;
            font-size: 14px;
            margin: 10px 0;
        }

        /* Trạng thái Đã sinh hiệu */
        .status-active {
            color: #2bd56b; /* Màu xanh lá trong hình */
            font-size: 24px;
            font-weight: 500;
            margin-top: 10px;
        }

        .countdown {
            color: #2bd56b;
            font-size: 18px;
            margin-top: 5px;
        }

        /* Footer thông báo bảo mật */
        .security-notice {
            margin-top: 40px;
            color: #f4e4c0;
            font-size: 14px;
            line-height: 1.6;
            text-align: left;
            padding: 0 10px;
            opacity: 0.85;
        }

    </style>
</head>
<body>

    <div class="wrapper">
        <div class="user-id">V25090035(Kaelen Nguyen)</div>

        <div class="main-card">
            <div class="circle-cutout cut-left"></div>
            <div class="circle-cutout cut-right"></div>

            <div class="banner-top">
                将二维码对准扫描器刷码出场
            </div>

            <div class="content-bottom">
                <div class="time-stamp">2026-4-20 09:06:54</div>
                
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=KaelenNguyen" class="qr-code" alt="QR">

                <div class="refresh-btn">刷新二维码</div>

                <div class="status-active">已生效</div>
                <div class="countdown">48:29</div>
            </div>
        </div>

        <div class="security-notice">
            尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
        </div>
    </div>

</body>
</html>
