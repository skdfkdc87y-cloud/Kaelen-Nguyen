<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Security QR</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #2c2e3e; /* Màu nền tối giống ảnh */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            color: #e0c9a6;
        }

        .container {
            width: 100%;
            max-width: 414px; /* Tỉ lệ màn hình điện thoại phổ biến */
            padding-top: 60px;
            text-align: center;
        }

        .user-info {
            font-size: 1.15rem;
            margin-bottom: 25px;
            color: #e0c9a6;
            letter-spacing: 0.5px;
        }

        /* THẺ QR CHÍNH */
        .qr-card {
            background: white;
            border-radius: 8px;
            margin: 0 35px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* Phần Header màu vàng - Chỉnh lại tỉ lệ hẹp hơn giống ảnh */
        .qr-header {
            background-color: #f5c542;
            color: rgba(255, 255, 255, 0.9);
            padding: 22px 15px; /* Tăng độ dày vừa phải */
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .qr-body {
            padding: 20px 0 30px 0;
            color: #333;
        }

        #current-time {
            font-size: 1.05rem;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .qr-image-container {
            width: 70%; /* Kích thước QR giống ảnh */
            margin: 10px auto;
        }

        .ewm {
            width: 100%;
            height: auto;
            display: block;
        }

        .refresh-btn {
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            display: block;
            margin-top: 5px;
        }

        .status-active {
            color: #2ecc71;
            font-size: 1.35rem;
            font-weight: 600;
            margin-top: 15px;
            /* Hiệu ứng nhịp thở nhẹ */
            animation: breath 2.5s infinite ease-in-out;
        }

        #timer {
            color: #2ecc71;
            font-size: 1rem;
            font-weight: 500;
        }

        @keyframes breath {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* Hai lỗ khuyết nhỏ ở giữa khớp nối */
        .notch {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #2c2e3e;
            border-radius: 50%;
            top: 78px; /* Khớp với vị trí vạch chia vàng/trắng */
        }
        .notch-left { left: -6px; }
        .notch-right { right: -6px; }

        /* THÔNG BÁO CUỐI */
        .footer-note {
            margin: 40px 35px;
            font-size: 0.82rem;
            line-height: 1.7;
            color: #b5a184;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="user-info">V25090035(Nguyễn Tất Khanh)</div>

    <div class="qr-card">
        <div class="qr-header">
            将二维码对准扫描器刷码出场
        </div>
        
        <div class="notch notch-left"></div>
        <div class="notch notch-right"></div>

        <div class="qr-body">
            <div id="current-time"></div>
            
            <div class="qr-image-container">
                <img src="./ewm.gif" class="ewm" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=KaelenNguyen'">
            </div>

            <a href="javascript:location.reload()" class="refresh-btn">刷新二维码</a>
            
            <div class="status-active">已生效</div>
            <div id="timer">48:29</div>
        </div>
    </div>

    <div class="footer-note">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // 1. Cập nhật thời gian thực (YYYY-M-D HH:mm:ss)
    function updateClock() {
        const now = new Date();
        const y = now.getFullYear();
        const m = now.getMonth() + 1;
        const d = now.getDate();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        
        document.getElementById('current-time').textContent = `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
    }

    // 2. Logic Đếm ngược bền vững (sử dụng LocalStorage)
    let startTime = localStorage.getItem("qrStartTime");
    if (!startTime) {
        startTime = Date.now();
        localStorage.setItem("qrStartTime", startTime);
    }

    function updateTimer() {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        let totalSeconds = (48 * 60) + 29; // Mốc bắt đầu
        
        let remaining = totalSeconds - (elapsed % totalSeconds);
        
        const mins = Math.floor(remaining / 60);
        const secs = remaining % 60;
        
        document.getElementById('timer').textContent = 
            `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    setInterval(updateClock, 1000);
    setInterval(updateTimer, 1000);
    updateClock();
    updateTimer();
</script>

</body>
</html>
