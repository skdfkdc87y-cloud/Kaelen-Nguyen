<html>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Type" content="text/html; charset=GBK">
	<title>&#8206;</title>
	<link rel="apple-touch-icon-precomposed" href="http://abc.haoyunlai.xyz/favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="./style.css">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<link rel="apple-touch-icon" href="icon.png">
	<link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
	<link rel="manifest" href="manifest.json">
	
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            /* Thay ảnh nền IMG_8622.jpeg của bạn */
            background: url('IMG_8622.jpeg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            min-height: 50vh;
            overflow: hidden;
        }

        /* Lớp phủ tối để nổi bật thẻ và chữ */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* Tăng độ tối giúp chữ nét hơn */
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 380px;
            padding-top: 55px;
            text-align: center;
            z-index: 1;
        }

        /* Dòng tên: Đã chỉnh font-weight và bóng đổ cực nét */
        .user-info {
            font-size: 1.1rem;
            margin-bottom: 25px;
            font-weight: 600;
            color: #e0c9a6;
            text-shadow: 
                0px 2px 4px rgba(0, 0, 0, 1), 
                0px 0px 10px rgba(0, 0, 0, 0.8);
            letter-spacing: 0.5px;
        }

        /* Thẻ QR: Tỉ lệ hẹp và bo góc 12px theo mẫu */
        .qr-card {
            background: white;
            border-radius: 12px;
            margin: 0 45px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* Phần đầu: Màu vàng cam, tỉ lệ gọn */
        .qr-header {
            background-color: #f5c542;
            color: white;
            padding: 22px 15px;
            font-size: 0.85rem;
            font-weight: 400;
            line-height: 1.2;
        }

        .qr-body {
            padding: 20px 10px 30px 10px;
            color: #333;
        }

        #current-time {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 12px;
            color: #333;
            letter-spacing: -0.5px;
        }

        .qr-image-container {
            width: 78%;
            margin: 0 auto;
        }

        .ewm {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Chữ văn bản thuần, không thể nhấn vô */
        .refresh-text {
            color: #999;
            font-size: 0.8rem;
            display: block;
            margin: 15px 0 10px 0;
            user-select: none;
        }

        .status-active {
            color: #2ecc71;
            font-size: 1.35rem;
            font-weight: bold;
            margin-top: 5px;
            animation: breath 2.5s infinite ease-in-out;
        }

        /* Thời gian đếm tăng tự reset sau 12h */
        #timer-up {
            color: #2ecc71;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 2px;
        }

        @keyframes breath {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* Lỗ khuyết màu XÁM XANH chuẩn theo ảnh mẫu */
        .notch {
            position: absolute;
            width: 14px;
            height: 14px;
            background-color: #2e3045; /* Màu xám xanh chuẩn */
            border-radius: 50%;
            top: 54px;
            z-index: 2;
        }
        .notch-left { left: -7px; }
        .notch-right { right: -7px; }

        .footer-note {
            margin: 40px;
            font-size: 0.82rem;
            line-height: 1.7;
            color: #e0c9a6;
            text-align: left;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 1);
            opacity: 0.95;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div class="user-info">V25090035(Kaelen Nguyen)</div>

    <div class="qr-card">
        <div class="qr-header">
            将二维码对准扫描器刷码出场
        </div>
        
        <div class="notch notch-left"></div>
        <div class="notch notch-right"></div>

        <div class="qr-body">
            <div id="current-time"></div>
            
            <div class="qr-image-container">
                <img src="./ewm.gif" class="ewm" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=KaelenNguyen'">
            </div>

            <span class="refresh-text">刷新二维码</span>
            
            <div class="status-active">已生效</div>
            <div id="timer-up">00:00</div>
        </div>
    </div>

    <div class="footer-note">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // Cập nhật giờ hệ thống (Dòng trên mã QR)
    function updateClock() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('current-time').textContent = `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
    }

    // Logic đếm tăng (Count-up) - Tự động reset sau 12 tiếng
    let startTime = localStorage.getItem("qrStartTimeCounter");
    if (!startTime) {
        startTime = Date.now();
        localStorage.setItem("qrStartTimeCounter", startTime);
    } else {
        startTime = parseInt(startTime);
    }

    function updateTimer() {
        let now = Date.now();
        let diffInSecs = Math.floor((now - startTime) / 1000);
        
        // Reset sau 12 tiếng (43200 giây)
        if (diffInSecs >= 43200) {
            startTime = Date.now();
            localStorage.setItem("qrStartTimeCounter", startTime);
            diffInSecs = 0;
        }

        const hrs = Math.floor(diffInSecs / 3600);
        const mins = Math.floor((diffInSecs % 3600) / 60);
        const secs = diffInSecs % 60;

        let display = hrs > 0 
            ? `${hrs}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`
            : `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        
        document.getElementById('timer-up').textContent = display;
    }

    setInterval(updateClock, 1000);
    setInterval(updateTimer, 1000);
    updateClock();
    updateTimer();
</script>

</body>
