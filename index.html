<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Security Access</title>
    <style>
        /* Thiết lập nền và font chữ */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #2c2e3e; /* Màu nền tối nếu không có ảnh */
            background-image: url("IMG_8622.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #f4e4c0;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 450px;
            margin-top: 50px;
            text-align: center;
        }

        /* Tên nhân viên phía trên */
        .header-info {
            color: #f4e4c0;
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* Khu vực thẻ QR */
        .card-container {
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Banner màu vàng - Chỉnh tông màu giống ảnh */
        .yellow-banner {
            background-color: #ebb94d; /* Màu vàng nghệ giống ảnh */
            color: #fffdec;
            padding: 20px 10px;
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Nội dung bên trong thẻ trắng */
        .qr-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .timestamp {
            color: #333;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .qr-image {
            width: 250px;
            height: 250px;
            object-fit: contain;
        }

        .refresh-text {
            color: #888;
            font-size: 0.9rem;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        /* Phần thông báo bảo mật phía dưới */
        .security-footer {
            margin-top: 40px;
            padding: 0 20px;
            color: #f4e4c0;
            font-size: 0.85rem;
            line-height: 1.6;
            text-align: left;
            opacity: 0.9;
        }

        /* Hiệu ứng nhấp nháy cho text (nếu cần) */
        .word_breath {
            animation: breath 1.5s ease-in-out infinite;
        }

        @keyframes breath {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="header-info">
            V25090035(Kaelen Nguyen)
        </div>

        <div class="card-container">
            <div class="yellow-banner">
                将二维码对准扫描器刷码出场
            </div>
            
            <div class="qr-content">
                <div class="timestamp">2026-4-20 08:56:00</div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=KaelenNguyen" alt="QR Code" class="qr-image">
                <div class="refresh-text">刷新二维码</div>
            </div>
        </div>

        <div class="security-footer">
            尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
        </div>
    </div>

</body>
</html>
