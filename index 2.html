<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security QR Interface</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #2c2e3e; /* Màu nền tối */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #e0c9a6;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }

        .header-id {
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .qr-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .qr-header {
            background-color: #f5c542; /* Màu vàng phía trên */
            color: #fff;
            padding: 15px;
            font-size: 0.9rem;
        }

        .qr-body {
            padding: 20px;
            position: relative;
        }

        .current-time {
            color: #333;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .qr-code-img {
            width: 80%;
            margin: 10px auto;
            display: block;
        }

        .refresh-text {
            color: #888;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .status-active {
            color: #2ecc71; /* Màu xanh lá */
            font-size: 1.4rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .countdown {
            color: #2ecc71;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.8rem;
            line-height: 1.6;
            color: #b5a184;
            padding: 0 20px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-id">V25090035(Kaelen Nguyen)</div>

        <div class="qr-card">
            <div class="qr-header">
                将二维码对准扫描器刷码出场
            </div>
            <div class="qr-body">
                <div id="real-time" class="current-time">2026-04-20 09:06:54</div>
                
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=KaelenNguyen" alt="QR Code" class="qr-code-img">
                
                <div class="refresh-text">刷新二维码</div>
                
                <div class="status-active">已生效</div>
                <div id="timer" class="countdown">48:29</div>
            </div>
        </div>

        <div class="footer-text">
            尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
        </div>
    </div>

    <script>
        // 1. Cập nhật thời gian thực (Giờ hệ thống)
        function updateClock() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('real-time').textContent = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        // 2. Bộ đếm ngược (Countdown)
        let totalSeconds = 48 * 60 + 29; // Bắt đầu từ 48:29
        function updateTimer() {
            if (totalSeconds <= 0) {
                totalSeconds = 60 * 60; // Reset nếu về 0
            }
            totalSeconds--;
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            document.getElementById('timer').textContent = 
                `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        // Chạy hàm mỗi giây
        setInterval(updateClock, 1000);
        setInterval(updateTimer, 1000);
        
        // Gọi ngay lập tức để không bị trễ 1s đầu
        updateClock();
    </script>
</body>
</html>
